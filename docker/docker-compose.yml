services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: owlet
      POSTGRES_PASSWORD: owlet
      POSTGRES_DB: owlet_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - 8080:8080

volumes:
  postgres_data: